version: 5
name: capital_position
sql_table: capital_position
query_variables: {}
data_source: capital_db
columns:
- name: reporting_date
  sql: reporting_date
  type: TIMESTAMP
  primary_key: false
  description: Regulatory reporting date (quarter-end)
  hidden: false
- name: entity
  sql: entity
  type: TEXT
  primary_key: false
  description: Legal entity identifier
  hidden: false
- name: cet1_capital_mm
  sql: cet1_capital_mm
  type: DOUBLE
  primary_key: false
  description: Common Equity Tier 1 capital in millions GBP
  hidden: false
- name: rwa_mm
  sql: rwa_mm
  type: DOUBLE
  primary_key: false
  description: Risk-weighted assets in millions GBP
  hidden: false
- name: cet1_ratio_pct
  sql: cet1_ratio_pct
  type: DOUBLE
  primary_key: false
  description: CET1 ratio as a percentage (cet1_capital_mm / rwa_mm * 100)
  hidden: false
- name: combined_buffer
  sql: combined_buffer
  type: DOUBLE
  primary_key: false
  description: Combined buffer requirement as a percentage (CCB + G-SII + countercyclical)
  hidden: false
measures:
- formula: cet1_ratio_pct:max
  name: latest_cet1_ratio
  label: Latest CET1 Ratio (%)
- formula: combined_buffer:max
  name: latest_combined_buffer
  label: Latest Combined Buffer Requirement (%)
- formula: cet1_ratio_pct:max - combined_buffer:max
  name: buffer_headroom
  label: Buffer Headroom (percentage points above regulatory minimum)
- formula: cet1_capital_mm:sum
  name: total_cet1_capital
  label: Total CET1 Capital (millions GBP)
- formula: rwa_mm:sum
  name: total_rwa
  label: Total Risk-Weighted Assets (millions GBP)
aggregations: []
joins: []
filters: []
description: "Capital adequacy snapshot per legal entity and reporting date under\
  \ Basel III/IV. Contains CET1 capital, risk-weighted assets, CET1 ratios, and combined\
  \ regulatory buffer requirements. Use the named measures below \u2014 do not reference\
  \ raw columns directly when a measure already captures the metric you need.\n"
hidden: false
